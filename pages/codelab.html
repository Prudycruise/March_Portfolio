<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevSite | CodeLab</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/main.js" defer></script>
  <script src="../assets/js/theme.js" defer></script>
  <script src="../assets/js/reveal.js" defer></script>
  <script src="../assets/js/search.js" defer></script>
  <script src="../assets/js/codelab.js" defer></script>
</head>
<body>
  <header class="navbar" aria-label="Primary navigation">
    <div class="logo">DevSite <span class="version-badge">v1.0</span></div>
    <button id="navToggle" class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
    <nav id="navMenu" class="nav-menu">
      <a class="nav-link" href="../index.html">Home</a>
      <a class="nav-link" href="codelab.html">CodeLab</a>
      <a class="nav-link" href="lifegames.html">LifeGames</a>
      <a class="nav-link" href="threearena.html">ThreeArena</a>
      <a class="nav-link" href="languages.html">Languages</a>
      <a class="nav-link" href="changelog.html">Changelog</a>
      <button id="themeToggle" class="theme-toggle" type="button">☀️ Light</button>
    </nav>
  </header>

  <main class="container">
    <section class="reveal" data-search-item>
      <h1>CodeLab</h1>
      <p>Write JavaScript in the editor and run the challenge validator.</p>
    </section>

    <section class="reveal">
      <label for="searchInput">Search this page</label>
      <input id="searchInput" type="search" placeholder="Search challenge content...">
    </section>

    <section class="card reveal" data-search-item>
      <h2 id="challengeText">Challenge loading...</h2>
      <label for="codeEditor">Editor</label>
      <textarea id="codeEditor" spellcheck="false">function square(n) {
  return n;
}</textarea>
      <div class="inline-controls">
        <button id="runCodeBtn" class="button" type="button">Run Code</button>
      </div>
      <div id="codeFeedback" class="feedback" aria-live="polite">Run your code to see feedback.</div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span>CodeLab module</span>
      <span class="version-badge">DevSite v1.0</span>
    </div>
  </footer>

  <a href="../index.html" class="home-fab" aria-label="Back to home">⌂</a>
</body>
</html>
